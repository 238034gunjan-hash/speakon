project = { name = "SpeakOn" }

[[services]]
name = "backend"
path = "backend"
dockerfile = "Dockerfile"
start = "gunicorn -w 4 -b 0.0.0.0:${PORT:-8080} app:app"

[services.environment]
# Set the real value in Railway Dashboard.
GROQ_API_KEY = ""

[[services]]
name = "frontend"
path = "frontend"
dockerfile = "Dockerfile"
start = "nginx -g 'daemon off;'"

[services.environment]
# Set this to the deployed backend URL, for example:
# API_BASE_URL = "https://your-backend-service.up.railway.app"
API_BASE_URL = ""
